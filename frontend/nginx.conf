server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # DNS interno de Docker. Es imprescindible resolver en cada petición
    # (proxy_pass con variable): si se usara el nombre literal, nginx cachearía
    # la IP al arrancar y devolvería 502 en cuanto se recreara un contenedor.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Los assets del bundle llevan hash en el nombre: se pueden cachear.
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------------------------------------------------------------
    # Pasarela hacia los microservicios.
    #
    # El frontend los llama con rutas relativas (/api/...), así que el
    # navegador ve un único origen: no hace falta CORS ni abrir los
    # puertos 3001-3004 en el grupo de seguridad de EC2.
    #
    # El prefijo se elimina con la captura del regex:
    #   /api/equipos/equipos  ->  equipos-ms:3002/equipos
    # ---------------------------------------------------------------
    location ~ ^/api/auth/(.*)$ {
        set $upstream_auth http://auth-ms:3001;
        proxy_pass $upstream_auth/$1$is_args$args;
        include /etc/nginx/conf.d/proxy-headers.inc;
    }

    location ~ ^/api/equipos/(.*)$ {
        set $upstream_equipos http://equipos-ms:3002;
        proxy_pass $upstream_equipos/$1$is_args$args;
        include /etc/nginx/conf.d/proxy-headers.inc;
    }

    location ~ ^/api/admin/(.*)$ {
        set $upstream_admin http://admin-ms:3003;
        proxy_pass $upstream_admin/$1$is_args$args;
        include /etc/nginx/conf.d/proxy-headers.inc;
    }

    location ~ ^/api/jugadores/(.*)$ {
        set $upstream_jugadores http://jugadores-ms:3004;
        proxy_pass $upstream_jugadores/$1$is_args$args;
        include /etc/nginx/conf.d/proxy-headers.inc;
    }

    # SPA: se sirve el HTML exportado si existe y, si no, lo resuelve
    # expo-router en el cliente. Se apunta a $uri/index.html en lugar de $uri/
    # para no provocar un 301 de barra final en cada ruta anidada.
    location / {
        try_files $uri $uri.html $uri/index.html /index.html;
    }
}
