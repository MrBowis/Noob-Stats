name: "Fase 1 · Deps & Lint"

# ─────────────────────────────────────────────────────────────────────────────
# Se ejecuta en:
#   - Toda PR hacia dev  → solo lint (gate de merge, sin auto-merge)
#   - Push a dev         → lint + auto-merge dev→test (dispara Fase 2)
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

permissions:
  contents: write

jobs:
  lint:
    name: "Deps & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            auth-ms/package-lock.json
            frontend/package-lock.json

      - name: auth-ms · install
        working-directory: auth-ms
        run: npm ci

      - name: auth-ms · lint
        working-directory: auth-ms
        run: npm run lint

      - name: frontend · install
        working-directory: frontend
        run: npm ci

      - name: frontend · lint
        working-directory: frontend
        run: npm run lint

      - name: frontend · typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: "Telegram · Fase 1"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 1 · Deps &amp; Lint</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # Solo se ejecuta en push (no en PR) y solo si lint pasó
  promote-to-test:
    name: "Auto-merge dev → test"
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev → test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout -B test origin/test 2>/dev/null || git checkout -b test
          git merge --no-ff -X theirs origin/dev -m "chore: auto-merge dev → test [ci]"
          git push origin test

      - name: "Telegram · Auto-merge dev → test"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="🔀" || ICON="❌"
          MSG="$ICON <b>Auto-merge dev → test</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"
