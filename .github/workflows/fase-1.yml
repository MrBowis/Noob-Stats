name: "Fase 1 · Deps & Lint"

# ─────────────────────────────────────────────────────────────────────────────
# PR a dev  → solo lint (gate de merge)
# Push a dev → lint + auto-merge dev→test + dispara Fase 2 vía API
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

permissions:
  contents: write
  actions: write

jobs:
  lint:
    name: "Deps & Lint · ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - auth-ms
          - equipos-ms
          - admin-ms
          - futbolista-ms
          - frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Node 22: @supabase/supabase-js requiere WebSocket nativo, que Node 20
      # no trae. Es la misma versión que usan las imágenes de Docker.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.project }}
        run: npm run lint

      - name: Typecheck
        if: matrix.project == 'frontend'
        working-directory: frontend
        run: npm run typecheck

      - name: "Telegram · Fase 1 · ${{ matrix.project }}"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 1 · Deps &amp; Lint · ${{ matrix.project }}</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # Solo en push (no en PR) y solo si lint pasó en todos los proyectos
  promote-and-trigger:
    name: "Merge dev→test · Disparar Fase 2"
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev → test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout -B test origin/test 2>/dev/null || git checkout -b test
          git merge --no-ff -X theirs origin/dev -m "chore: auto-merge dev → test [ci]"
          git push origin test

      - name: Disparar Fase 2
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/fase-2.yml/dispatches" \
            -d '{"ref":"test"}'

      - name: "Telegram · Merge dev → test"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="🔀" || ICON="❌"
          MSG="$ICON <b>Auto-merge dev → test</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"
