name: CI / CD

# ─────────────────────────────────────────────────────────────────────────────
# FLUJO:
#   feature/* ──PR──→ dev    Fase 1: deps + lint  (gate de merge)
#   push a dev               Fase 1 + 2 → auto-merge dev→test
#                            Fase 3 (deploy) → auto-merge test→main
#
# Solo hay dos triggers: PR a dev y push a dev.
# Los merges a test y main los hace el propio pipeline.
# ─────────────────────────────────────────────────────────────────────────────
on:
  pull_request:
    branches: [dev]
  push:
    branches: [dev]

# GITHUB_TOKEN necesita permisos de escritura para hacer los auto-merges.
permissions:
  contents: write

# Secrets requeridos en GitHub → Settings → Secrets and variables → Actions:
#   TELEGRAM_BOT_TOKEN  → token del bot de Telegram (de @BotFather)
#   TELEGRAM_CHAT_ID    → ID del chat/grupo que recibirá las notificaciones
#   SONAR_TOKEN         → SonarCloud → My Account → Security → Generate Token
#   RENDER_DEPLOY_HOOK  → Render → servicio → Settings → Deploy Hooks
#   VERCEL_DEPLOY_HOOK  → Vercel → proyecto → Settings → Git → Deploy Hooks

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 1 — DEPS + LINT   (toda PR y todo push a dev)
  # ═══════════════════════════════════════════════════════════════════════════
  install:
    name: "Fase 1 · Deps & Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            auth-ms/package-lock.json
            frontend/package-lock.json

      - name: auth-ms · install
        working-directory: auth-ms
        run: npm ci

      - name: auth-ms · lint
        working-directory: auth-ms
        run: npm run lint

      - name: frontend · install
        working-directory: frontend
        run: npm ci

      - name: frontend · lint
        working-directory: frontend
        run: npm run lint

      - name: frontend · typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: "Telegram · Fase 1"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 1 · Deps &amp; Lint</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 2 — TESTS   (solo push a dev; PR solo pasa por Fase 1)
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: "Fase 2 · Tests · ${{ matrix.project }}"
    needs: install
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: auth-ms
            test-cmd: npm run test:cov
          - project: frontend
            test-cmd: npm test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Run tests with coverage
        working-directory: ${{ matrix.project }}
        run: ${{ matrix.test-cmd }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.project }}
          path: ${{ matrix.project }}/coverage/lcov.info
          retention-days: 1

      - name: "Telegram · Fase 2 · Tests · ${{ matrix.project }}"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 2 · Tests · ${{ matrix.project }}</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 2b — SONARCLOUD
  # ═══════════════════════════════════════════════════════════════════════════
  sonar:
    name: "Fase 2 · SonarCloud"
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage · auth-ms
        uses: actions/download-artifact@v4
        with:
          name: coverage-auth-ms
          path: auth-ms/coverage

      - name: Download coverage · frontend
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: "Telegram · Fase 2 · SonarCloud"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 2 · SonarCloud</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 2c — BUILD   (paralelo con Sonar)
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: "Fase 2 · Build · ${{ matrix.project }}"
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: auth-ms
            build-cmd: npm run build
            artifact-path: auth-ms/dist
          - project: frontend
            build-cmd: npx expo export --platform web
            artifact-path: frontend/dist
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Build
        working-directory: ${{ matrix.project }}
        run: ${{ matrix.build-cmd }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.project }}
          path: ${{ matrix.artifact-path }}
          retention-days: 7

      - name: "Telegram · Fase 2 · Build · ${{ matrix.project }}"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 2 · Build · ${{ matrix.project }}</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ═══════════════════════════════════════════════════════════════════════════
  # AUTO-MERGE dev → test   (Sonar + Build aprobados)
  # ═══════════════════════════════════════════════════════════════════════════
  promote-to-test:
    name: "Auto-merge dev → test"
    needs: [sonar, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge dev → test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          # Crea test si no existe; si existe, la resetea a origin/test
          git checkout -B test origin/test 2>/dev/null || git checkout -b test
          git merge --no-ff -X theirs origin/dev -m "chore: auto-merge dev → test [ci]"
          git push origin test

      - name: "Telegram · Auto-merge dev → test"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="🔀" || ICON="❌"
          MSG="$ICON <b>Auto-merge dev → test</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ═══════════════════════════════════════════════════════════════════════════
  # FASE 3 — DEPLOY   (después del merge a test)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: "Fase 3 · Deploy"
    needs: promote-to-test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy auth-ms → Render
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Render response: $response"
          [[ "$response" == "200" || "$response" == "201" ]] || exit 1

      - name: Deploy frontend → Vercel
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}")
          echo "Vercel response: $response"
          [[ "$response" == "200" || "$response" == "201" ]] || exit 1

      - name: "Telegram · Fase 3 · Deploy"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="🚀" || ICON="💥"
          MSG="$ICON <b>Fase 3 · Deploy</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ═══════════════════════════════════════════════════════════════════════════
  # AUTO-MERGE test → main   (deploy aprobado)
  # ═══════════════════════════════════════════════════════════════════════════
  promote-to-main:
    name: "Auto-merge test → main"
    needs: deploy
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge test → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          # Crea main si no existe; si existe, la resetea a origin/main
          git checkout -B main origin/main 2>/dev/null || git checkout -b main
          git merge --no-ff -X theirs origin/test -m "chore: auto-merge test → main [ci]"
          git push origin main

      - name: "Telegram · Auto-merge test → main"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="🏁" || ICON="❌"
          MSG="$ICON <b>Auto-merge test → main</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"
