name: "Fase 2 · Tests, Sonar & Build"

# ─────────────────────────────────────────────────────────────────────────────
# Disparado por Fase 1 vía workflow_dispatch sobre la rama test.
# Al final, si todo pasa, hace merge test→main y dispara Fase 3.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  # ─── Tests ──────────────────────────────────────────────────────────────────
  test:
    name: "Tests · ${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: auth-ms
            test-cmd: npm run test:cov
          - project: equipos-ms
            test-cmd: npm run test:cov
          - project: admin-ms
            test-cmd: npm run test:cov
          - project: futbolista-ms
            test-cmd: npm run test:cov
          - project: frontend
            test-cmd: npm test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - name: Install
        working-directory: ${{ matrix.project }}
        run: npm ci

      - name: Run tests with coverage
        working-directory: ${{ matrix.project }}
        run: ${{ matrix.test-cmd }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.project }}
          path: ${{ matrix.project }}/coverage/lcov.info
          retention-days: 1

      - name: "Telegram · Tests · ${{ matrix.project }}"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 2 · Tests · ${{ matrix.project }}</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ─── SonarCloud ─────────────────────────────────────────────────────────────
  # El alcance del análisis lo define sonar-project.properties (auth-ms y
  # frontend). Si se amplía a los demás microservicios, añade aquí la descarga
  # de sus artefactos de cobertura.
  sonar:
    name: "SonarCloud"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage · auth-ms
        uses: actions/download-artifact@v4
        with:
          name: coverage-auth-ms
          path: auth-ms/coverage

      - name: Download coverage · frontend
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend
          path: frontend/coverage

      # sonarcloud-github-action está deprecada y su scanner corre sobre Java
      # 17, que SonarQube Cloud ya no admite. sonarqube-scan-action es su
      # sustituto directo y usa un scanner sobre Java 21+.
      # No hace falta SONAR_HOST_URL: por defecto apunta a SonarQube Cloud.
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: "Telegram · SonarQube Cloud"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 2 · SonarQube Cloud</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ─── Build de las imágenes Docker ───────────────────────────────────────────
  # Se construye la misma pila que se desplegará en EC2, así un Dockerfile roto
  # se detecta aquí y no durante el despliegue.
  build:
    name: "Build · imágenes Docker"
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: .env de compilación
        # docker compose interpola el archivo entero al leerlo: las variables
        # obligatorias deben existir aunque aquí no se arranque nada.
        run: |
          cat > .env <<'EOF'
          SUPABASE_URL=http://build-placeholder
          SUPABASE_ANON_KEY=build-placeholder
          SUPABASE_SERVICE_ROLE_KEY=build-placeholder
          EOF

      - name: Build de la pila
        run: docker compose build

      - name: "Telegram · Build Docker"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="✅" || ICON="❌"
          MSG="$ICON <b>Fase 2 · Build imágenes Docker</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Rama: <code>${{ github.ref_name }}</code>
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"

  # ─── Merge test→main + disparar Fase 3 (solo si sonar + build pasaron) ──────
  promote-and-trigger:
    name: "Merge test→main · Disparar Fase 3"
    needs: [sonar, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge test → main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout -B main origin/main 2>/dev/null || git checkout -b main
          git merge --no-ff -X theirs origin/test -m "chore: auto-merge test → main [ci]"
          git push origin main

      - name: Disparar Fase 3
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/fase-3.yml/dispatches" \
            -d '{"ref":"main"}'

      - name: "Telegram · Merge test → main"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          [[ "$STATUS" == "success" ]] && ICON="🔀" || ICON="❌"
          MSG="$ICON <b>Auto-merge test → main</b>
          Estado: <b>$STATUS</b>
          Repo: ${{ github.repository }}
          Commit: <code>${GITHUB_SHA:0:7}</code>"
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg c "${{ secrets.TELEGRAM_CHAT_ID }}" --arg m "$MSG" \
              '{chat_id:$c,text:$m,parse_mode:"HTML"}')"
