apiVersion: 1

# Datasources provisionados automáticamente: no hay que configurarlos a mano
# en la interfaz de Grafana.
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
