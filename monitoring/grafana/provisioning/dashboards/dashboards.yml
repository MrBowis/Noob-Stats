apiVersion: 1

# Carga los dashboards JSON desde disco. Al arrancar Grafana ya tiene los
# cuatro tableros disponibles sin pasos manuales.
providers:
  - name: Noob Stats
    orgId: 1
    folder: Noob Stats
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
