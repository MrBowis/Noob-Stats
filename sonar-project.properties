sonar.projectKey=MrBowis_Noob-Stats
sonar.organization=mrbowis

# Nombre y versión mostrados en SonarCloud
sonar.projectName=Noob-Stats
sonar.projectVersion=1.0

# Análisis limitado exclusivamente a auth-ms/ y frontend/
sonar.sources=auth-ms,frontend

# Exclusiones globales (no son código fuente analizable)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/.expo/**,\
  auth-ms/test/**,\
  frontend/assets/**

# Tests (specs ubicados junto al código fuente)
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx

# Reportes de cobertura LCOV (JS/TS)
sonar.javascript.lcov.reportPaths=auth-ms/coverage/lcov.info,frontend/coverage/lcov.info

# Excluir de cobertura el código sin lógica (DTOs, entidades, bootstrap,
# pantallas/componentes de UI y configuración) para centrar el Quality Gate
# en la lógica testeable.
sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  auth-ms/src/main.ts,\
  auth-ms/src/**/*.module.ts,\
  auth-ms/src/**/*.dto.ts,\
  auth-ms/src/**/*.entity.ts,\
  auth-ms/src/auth/presentation/decorators/**,\
  frontend/app/**,\
  frontend/components/**,\
  frontend/context/**,\
  frontend/theme/**,\
  frontend/lib/config.ts,\
  frontend/lib/types.ts,\
  frontend/lib/session-storage.ts

sonar.sourceEncoding=UTF-8
