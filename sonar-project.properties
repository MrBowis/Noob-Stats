sonar.projectKey=MrBowis_Noob-Stats
sonar.organization=mrbowis

# Nombre y versión mostrados en SonarCloud
sonar.projectName=Noob-Stats
sonar.projectVersion=1.0

# Análisis de los 4 microservicios y el frontend
sonar.sources=auth-ms,equipos-ms,admin-ms,futbolista-ms,frontend

# Exclusiones globales (no son código fuente analizable)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/.expo/**,\
  auth-ms/test/**,\
  equipos-ms/test/**,\
  admin-ms/test/**,\
  futbolista-ms/test/**,\
  frontend/assets/**

# Tests (specs ubicados junto al código fuente)
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.test.tsx

# Reportes de cobertura LCOV (JS/TS)
sonar.javascript.lcov.reportPaths=\
  auth-ms/coverage/lcov.info,\
  equipos-ms/coverage/lcov.info,\
  admin-ms/coverage/lcov.info,\
  futbolista-ms/coverage/lcov.info,\
  frontend/coverage/lcov.info

# Excluir de cobertura el código sin lógica (DTOs, entidades, bootstrap,
# pantallas/componentes de UI y configuración) para centrar el Quality Gate
# en la lógica testeable. Alineado con `collectCoverageFrom` en cada
# package.json de los microservicios.
sonar.coverage.exclusions=\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.test.tsx,\
  auth-ms/src/main.ts,\
  auth-ms/src/**/*.module.ts,\
  auth-ms/src/**/*.dto.ts,\
  auth-ms/src/**/*.entity.ts,\
  auth-ms/src/**/decorators/**,\
  equipos-ms/src/main.ts,\
  equipos-ms/src/**/*.module.ts,\
  equipos-ms/src/**/*.dto.ts,\
  equipos-ms/src/**/*.entity.ts,\
  equipos-ms/src/**/decorators/**,\
  admin-ms/src/main.ts,\
  admin-ms/src/**/*.module.ts,\
  admin-ms/src/**/*.dto.ts,\
  admin-ms/src/**/*.entity.ts,\
  admin-ms/src/**/decorators/**,\
  futbolista-ms/src/main.ts,\
  futbolista-ms/src/**/*.module.ts,\
  futbolista-ms/src/**/*.dto.ts,\
  futbolista-ms/src/**/*.entity.ts,\
  futbolista-ms/src/**/decorators/**,\
  frontend/app/**,\
  frontend/components/**,\
  frontend/context/**,\
  frontend/theme/**,\
  frontend/lib/config.ts,\
  frontend/lib/types.ts,\
  frontend/lib/session-storage.ts

# Duplicación: los DTOs y módulos de NestJS repiten firmas/boilerplate por
# diseño y no representan deuda técnica real. El módulo observability/ y
# main.ts se duplican intencionalmente en cada microservicio porque son
# servicios independientes sin un workspace/paquete compartido (ver
# observability/*.module.ts en cada uno). Se excluyen del CPD.
sonar.cpd.exclusions=\
  **/*.dto.ts,\
  **/*.module.ts,\
  **/main.ts,\
  **/observability/**

sonar.sourceEncoding=UTF-8
